<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#7C5CFF" />
  <title>Phylax — Offline</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #070A12;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #2B1766, #0E2847);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      box-shadow: 0 0 40px rgba(124, 92, 255, 0.15);
    }

    .logo svg {
      width: 36px;
      height: 36px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.9rem;
      line-height: 1.6;
      max-width: 360px;
      margin-bottom: 2rem;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 12px;
      background: rgba(124, 92, 255, 0.08);
      border: 1px solid rgba(124, 92, 255, 0.15);
      margin-bottom: 2rem;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7C5CFF;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    .status-text {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.6);
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      background: #7C5CFF;
      color: white;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .retry-btn:hover { background: #6B4EE0; }
    .retry-btn:active { transform: scale(0.97); }

    .retry-btn.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .retry-btn.loading .spinner { display: block; }
    .retry-btn.loading .btn-text { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      color: rgba(255, 255, 255, 0.15);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
  </div>

  <h1>You're Offline</h1>
  <p class="subtitle">
    Don't worry — Phylax is still protecting your child's device.
    We'll reconnect automatically when your internet returns.
  </p>

  <div class="status">
    <div class="pulse"></div>
    <span class="status-text">Protection active on all paired devices</span>
  </div>

  <button class="retry-btn" onclick="retryConnection()">
    <span class="btn-text">Try Reconnecting</span>
    <div class="spinner"></div>
  </button>

  <div class="footer">Phylax Child Safety</div>

  <script>
    let retryInterval;

    function retryConnection() {
      const btn = document.querySelector('.retry-btn');
      btn.classList.add('loading');

      fetch('/dashboard', { method: 'HEAD', cache: 'no-store' })
        .then((res) => {
          if (res.ok) {
            window.location.replace('/dashboard');
          } else {
            btn.classList.remove('loading');
          }
        })
        .catch(() => {
          btn.classList.remove('loading');
        });
    }

    // Auto-retry every 10 seconds
    function startAutoRetry() {
      retryInterval = setInterval(() => {
        fetch('/dashboard', { method: 'HEAD', cache: 'no-store' })
          .then((res) => {
            if (res.ok) {
              clearInterval(retryInterval);
              window.location.replace('/dashboard');
            }
          })
          .catch(() => {
            // Still offline
          });
      }, 10000);
    }

    // Listen for online event
    window.addEventListener('online', () => {
      retryConnection();
    });

    startAutoRetry();
  </script>
</body>
</html>
